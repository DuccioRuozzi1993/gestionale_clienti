<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filiale — Task Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FFFFFF; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
  .task-card:hover .task-actions { opacity: 1 !important; }
  .action-btn:hover { background: #E2E8F0 !important; }
  .complete-btn:hover { border-color: #10B981 !important; background: #D1FAE5 !important; }
  .complete-btn:hover .check-mark { opacity: 1 !important; }
  .search-input:focus { border-color: #3B82F6 !important; }
  .kbd { display: inline-block; background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 3px; padding: 0 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #64748B; margin-left: 4px; line-height: 1.6; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes pulseRed { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } 50% { box-shadow: 0 0 0 4px rgba(239,68,68,0.15); } }
  .pulse-red { animation: pulseRed 2s ease infinite; }
  @keyframes pulseAmber { 0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } 50% { box-shadow: 0 0 0 4px rgba(245,158,11,0.15); } }
  .pulse-amber { animation: pulseAmber 2s ease infinite; }
  @keyframes shrinkBar { from { width: 100%; } to { width: 0%; } }
  .drop-indicator-before { border-top: 2.5px solid #3B82F6 !important; margin-top: -1px; }
  .drop-indicator-after { border-bottom: 2.5px solid #3B82F6 !important; margin-bottom: -1px; }
  @keyframes completeOut { 0% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(30px) scale(0.95); } }
  .completing { animation: completeOut 0.35s ease forwards; pointer-events: none; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .toast { animation: toastIn 0.25s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STORAGE_KEY = "banktodo-tasks-v4";
const YESTERDAY_KEY = "banktodo-yesterday-dismissed";

const COLUMNS = {
  inbox:   { label: "Inbox",     icon: "📥", desc: "Butta tutto qui" },
  today:   { label: "Oggi",      icon: "🎯", desc: "Le tue 3-5 priorità" },
  waiting: { label: "In attesa", icon: "⏳", desc: "Chi ti deve rispondere?" },
  backlog: { label: "Backlog",   icon: "📋", desc: "Da smistare" },
};

const CATEGORIES = [
  { id: "amm", label: "Amm/Compliance",  color: "#7C3AED" },
  { id: "cli", label: "Clienti",         color: "#2563EB" },
  { id: "uff", label: "Uffici/Direzione", color: "#D97706" },
  { id: "int", label: "Interno",         color: "#059669" },
];

const RECURRENCE_OPTIONS = [
  { id: null, label: "Nessuna", icon: "—" },
  { id: "daily", label: "Ogni giorno", icon: "📅" },
  { id: "weekly", label: "Ogni settimana", icon: "🗓️" },
  { id: "monthly", label: "Ogni mese", icon: "📆" },
];

const todayStr = () => new Date().toISOString().slice(0, 10);
const daysSince = (d) => d ? Math.floor((new Date() - new Date(d)) / 86400000) : 0;
const daysUntil = (d) => d ? Math.ceil((new Date(d + "T23:59:59") - new Date()) / 86400000) : null;
const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

function nextDeadline(deadline, recurrence) {
  if (!deadline || !recurrence) return null;
  const d = new Date(deadline);
  if (recurrence === "daily") d.setDate(d.getDate() + 1);
  else if (recurrence === "weekly") d.setDate(d.getDate() + 7);
  else if (recurrence === "monthly") d.setMonth(d.getMonth() + 1);
  return d.toISOString().slice(0, 10);
}

function nextShowDate(recurrence) {
  const d = new Date();
  if (recurrence === "daily") d.setDate(d.getDate() + 1);
  else if (recurrence === "weekly") d.setDate(d.getDate() + 7);
  else if (recurrence === "monthly") d.setMonth(d.getMonth() + 1);
  return d.toISOString().slice(0, 10);
}

function agingColor(days) {
  if (days >= 7) return { bg: "#FEE2E2", border: "#EF4444", text: "#991B1B", badge: "#EF4444" };
  if (days >= 3) return { bg: "#FEF3C7", border: "#F59E0B", text: "#92400E", badge: "#F59E0B" };
  return null;
}

function deadlineColor(daysLeft) {
  if (daysLeft === null) return null;
  if (daysLeft < 0)  return { bg: "#FEE2E2", border: "#EF4444", text: "#DC2626", label: "SCADUTA", pulse: "pulse-red" };
  if (daysLeft === 0) return { bg: "#FEF3C7", border: "#F59E0B", text: "#D97706", label: "OGGI", pulse: "pulse-amber" };
  if (daysLeft === 1) return { bg: "#FEF9C3", border: "#EAB308", text: "#A16207", label: "DOMANI", pulse: "" };
  if (daysLeft <= 3) return { bg: "#FFF7ED", border: "#FB923C", text: "#C2410C", label: "fra " + daysLeft + "g", pulse: "" };
  return null;
}

function loadTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveTasks(tasks) { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

function App() {
  const [tasks, setTasks] = useState(loadTasks);
  const [inputText, setInputText] = useState("");
  const [showCompleted, setShowCompleted] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [editText, setEditText] = useState("");
  const [waitingModal, setWaitingModal] = useState(null);
  const [waitingInput, setWaitingInput] = useState("");
  const [deadlineModal, setDeadlineModal] = useState(null);
  const [deadlineInput, setDeadlineInput] = useState("");
  const [noteModal, setNoteModal] = useState(null);
  const [noteInput, setNoteInput] = useState("");
  const [checklistEdit, setChecklistEdit] = useState([]);
  const [checkItemInput, setCheckItemInput] = useState("");
  const [recurrenceModal, setRecurrenceModal] = useState(null);
  const [expandedNotes, setExpandedNotes] = useState({});
  const [draggedTask, setDraggedTask] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const [dropBeforeTask, setDropBeforeTask] = useState(null); // {id, position: "before"|"after"}
  const [filterCat, setFilterCat] = useState(null);
  const [catMenuTask, setCatMenuTask] = useState(null);
  const [searchText, setSearchText] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);
  const [yesterdayDismissed, setYesterdayDismissed] = useState(() => {
    return localStorage.getItem(YESTERDAY_KEY) === todayStr();
  });
  const [showBackup, setShowBackup] = useState(false);
  const [completingId, setCompletingId] = useState(null);
  const [deletedTask, setDeletedTask] = useState(null);
  const undoTimerRef = useRef(null);
  const inputRef = useRef(null);
  const waitingRef = useRef(null);
  const deadlineRef = useRef(null);
  const searchRef = useRef(null);
  const noteRef = useRef(null);
  const checkItemRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => { saveTasks(tasks); }, [tasks]);

  // Auto-focus input on load
  useEffect(() => { inputRef.current?.focus(); }, []);

  // Tab title with today count
  useEffect(() => {
    const todayN = tasks.filter(t => t.column === "today").length;
    document.title = todayN > 0 ? ("🎯 " + todayN + " | Filiale") : "Filiale — Task Manager";
  }, [tasks]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "k") {
        e.preventDefault();
        setSearchOpen(prev => !prev);
        setTimeout(() => searchRef.current?.focus(), 50);
      }
      if (e.key === "Escape") {
        setSearchOpen(false); setSearchText("");
        setWaitingModal(null); setDeadlineModal(null); setNoteModal(null);
        setRecurrenceModal(null);
        setEditingTask(null); setCatMenuTask(null); setShowBackup(false);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && document.activeElement === inputRef.current) {
        e.preventDefault();
        const text = inputRef.current.value.trim();
        if (!text) return;
        setTasks(prev => [...prev, {
          id: genId(), text, column: "today",
          createdAt: new Date().toISOString(),
          waitingFor: null, waitingDate: null, completedAt: null,
          category: null, deadline: null, notes: "", recurrence: null, checklist: [],
        }]);
        setInputText("");
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const addTask = useCallback(() => {
    const text = inputText.trim();
    if (!text) return;
    setTasks(prev => [...prev, {
      id: genId(), text, column: "inbox",
      createdAt: new Date().toISOString(),
      waitingFor: null, waitingDate: null, completedAt: null,
      category: null, deadline: null, notes: "", recurrence: null, checklist: [],
    }]);
    setInputText("");
    inputRef.current?.focus();
  }, [inputText]);

  const moveTask = useCallback((taskId, toColumn) => {
    if (toColumn === "waiting") {
      setWaitingModal(taskId);
      setWaitingInput("");
      setTimeout(() => waitingRef.current?.focus(), 100);
      return;
    }
    setTasks(prev => {
      const idx = prev.findIndex(t => t.id === taskId);
      if (idx === -1) return prev;
      const task = { ...prev[idx], column: toColumn, waitingFor: null, waitingDate: null };
      const without = prev.filter((_, i) => i !== idx);
      // Find last task in target column and insert after it
      let insertIdx = without.length;
      for (let i = without.length - 1; i >= 0; i--) {
        if (without[i].column === toColumn) { insertIdx = i + 1; break; }
      }
      // If no task found in that column, find the column boundary
      if (!without.some(t => t.column === toColumn)) {
        const colOrder = ["inbox", "today", "waiting", "backlog", "completed"];
        const targetColIdx = colOrder.indexOf(toColumn);
        insertIdx = without.length;
        for (let i = 0; i < without.length; i++) {
          if (colOrder.indexOf(without[i].column) > targetColIdx) {
            insertIdx = i; break;
          }
        }
      }
      const newTasks = [...without];
      newTasks.splice(insertIdx, 0, task);
      return newTasks;
    });
  }, []);

  const reorderTask = useCallback((dragId, targetId, position) => {
    setTasks(prev => {
      const dragIdx = prev.findIndex(t => t.id === dragId);
      const targetIdx = prev.findIndex(t => t.id === targetId);
      if (dragIdx === -1 || targetIdx === -1) return prev;
      const dragTask = prev[dragIdx];
      const targetTask = prev[targetIdx];
      // Update column if cross-column drop
      const updatedDragTask = { ...dragTask, column: targetTask.column, waitingFor: targetTask.column === "waiting" ? dragTask.waitingFor : null, waitingDate: targetTask.column === "waiting" ? dragTask.waitingDate : null };
      // If moving to waiting column and no waitingFor set, trigger modal
      if (targetTask.column === "waiting" && !dragTask.waitingFor) {
        // Can't trigger modal from here cleanly, so just move to inbox instead
        // Actually, let's just move it and it'll be in waiting without a name — user can add later
      }
      const without = prev.filter((_, i) => i !== dragIdx);
      let newTargetIdx = without.findIndex(t => t.id === targetId);
      const insertIdx = position === "after" ? newTargetIdx + 1 : newTargetIdx;
      const newTasks = [...without];
      newTasks.splice(insertIdx, 0, updatedDragTask);
      return newTasks;
    });
  }, []);

  const confirmWaiting = useCallback(() => {
    if (!waitingModal || !waitingInput.trim()) return;
    setTasks(prev => prev.map(t =>
      t.id === waitingModal ? {
        ...t, column: "waiting",
        waitingFor: waitingInput.trim(),
        waitingDate: new Date().toISOString(),
      } : t
    ));
    setWaitingModal(null); setWaitingInput("");
  }, [waitingModal, waitingInput]);

  const confirmDeadline = useCallback(() => {
    if (!deadlineModal) return;
    setTasks(prev => prev.map(t =>
      t.id === deadlineModal ? { ...t, deadline: deadlineInput || null } : t
    ));
    setDeadlineModal(null); setDeadlineInput("");
  }, [deadlineModal, deadlineInput]);

  const saveNote = useCallback(() => {
    if (!noteModal) return;
    setTasks(prev => prev.map(t =>
      t.id === noteModal ? { ...t, notes: noteInput, checklist: checklistEdit } : t
    ));
    setNoteModal(null); setNoteInput(""); setChecklistEdit([]); setCheckItemInput("");
  }, [noteModal, noteInput, checklistEdit]);

  const toggleCheckItem = useCallback((taskId, itemId) => {
    setTasks(prev => prev.map(t =>
      t.id === taskId ? {
        ...t,
        checklist: (t.checklist || []).map(c => c.id === itemId ? { ...c, done: !c.done } : c)
      } : t
    ));
  }, []);

  const setRecurrence = useCallback((taskId, recurrence) => {
    setTasks(prev => prev.map(t =>
      t.id === taskId ? { ...t, recurrence } : t
    ));
    setRecurrenceModal(null);
  }, []);

  const doComplete = useCallback((taskId) => {
    setTasks(prev => {
      const task = prev.find(t => t.id === taskId);
      if (!task) return prev;
      const updated = prev.map(t =>
        t.id === taskId ? { ...t, column: "completed", completedAt: new Date().toISOString() } : t
      );
      // If recurring, create a new task
      if (task.recurrence) {
        const newTask = {
          id: genId(),
          text: task.text,
          column: "inbox",
          createdAt: new Date().toISOString(),
          waitingFor: null, waitingDate: null, completedAt: null,
          category: task.category,
          deadline: nextDeadline(task.deadline || todayStr(), task.recurrence),
          notes: task.notes,
          recurrence: task.recurrence,
          showAfter: nextShowDate(task.recurrence),
          checklist: (task.checklist || []).map(c => ({...c, done: false})),
        };
        updated.push(newTask);
      }
      return updated;
    });
    setCompletingId(null);
  }, []);

  const completeTask = useCallback((taskId) => {
    setCompletingId(taskId);
    setTimeout(() => doComplete(taskId), 350);
  }, [doComplete]);

  const restoreTask = useCallback((taskId) => {
    setTasks(prev => prev.map(t =>
      t.id === taskId ? { ...t, column: "inbox", completedAt: null } : t
    ));
  }, []);

  const deleteTask = useCallback((taskId) => {
    setTasks(prev => {
      const task = prev.find(t => t.id === taskId);
      if (task) {
        setDeletedTask(task);
        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
        undoTimerRef.current = setTimeout(() => setDeletedTask(null), 5000);
      }
      return prev.filter(t => t.id !== taskId);
    });
  }, []);

  const undoDelete = useCallback(() => {
    if (!deletedTask) return;
    setTasks(prev => [...prev, deletedTask]);
    setDeletedTask(null);
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
  }, [deletedTask]);

  const startEdit = useCallback((task) => {
    setEditingTask(task.id); setEditText(task.text);
  }, []);

  const confirmEdit = useCallback(() => {
    if (!editingTask) return;
    setTasks(prev => prev.map(t =>
      t.id === editingTask ? { ...t, text: editText.trim() || t.text } : t
    ));
    setEditingTask(null); setEditText("");
  }, [editingTask, editText]);

  const setCategoryForTask = useCallback((taskId, catId) => {
    setTasks(prev => prev.map(t =>
      t.id === taskId ? { ...t, category: t.category === catId ? null : catId } : t
    ));
    setCatMenuTask(null);
  }, []);

  const toggleNote = useCallback((taskId) => {
    setExpandedNotes(prev => ({ ...prev, [taskId]: !prev[taskId] }));
  }, []);

  // Drag handlers
  const handleDragStart = (e, task) => {
    setDraggedTask(task.id);
    e.dataTransfer.effectAllowed = "move";
  };

  const handleColDragOver = (e, col) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDropTarget(col);
  };
  const handleColDragLeave = () => { setDropTarget(null); };
  const handleColDrop = (e, col) => {
    e.preventDefault(); setDropTarget(null); setDropBeforeTask(null);
    if (!draggedTask) return;
    // If dropped on column area (not on a specific task), move to end of column
    if (col === "waiting") {
      const task = tasks.find(t => t.id === draggedTask);
      if (task && !task.waitingFor) {
        setWaitingModal(draggedTask);
        setWaitingInput("");
        setTimeout(() => waitingRef.current?.focus(), 100);
        setDraggedTask(null);
        return;
      }
    }
    moveTask(draggedTask, col);
    setDraggedTask(null);
  };

  const handleTaskDragOver = (e, taskId) => {
    e.preventDefault();
    e.stopPropagation();
    if (taskId === draggedTask) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    const position = e.clientY < midY ? "before" : "after";
    setDropBeforeTask({ id: taskId, position });
    // Also set column drop target
    const task = tasks.find(t => t.id === taskId);
    if (task) setDropTarget(task.column);
  };

  const handleTaskDrop = (e, taskId) => {
    e.preventDefault();
    e.stopPropagation();
    setDropTarget(null); setDropBeforeTask(null);
    if (!draggedTask || draggedTask === taskId) { setDraggedTask(null); return; }
    const targetTask = tasks.find(t => t.id === taskId);
    // If dropping into waiting column and the dragged task has no waitingFor
    if (targetTask && targetTask.column === "waiting") {
      const dragTask = tasks.find(t => t.id === draggedTask);
      if (dragTask && !dragTask.waitingFor && dragTask.column !== "waiting") {
        // Need to get waitingFor - trigger modal, then reorder after
        setWaitingModal(draggedTask);
        setWaitingInput("");
        setTimeout(() => waitingRef.current?.focus(), 100);
        setDraggedTask(null);
        return;
      }
    }
    const rect = e.currentTarget.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    const position = e.clientY < midY ? "before" : "after";
    reorderTask(draggedTask, taskId, position);
    setDraggedTask(null);
  };

  const handleDragEnd = () => {
    setDraggedTask(null); setDropTarget(null); setDropBeforeTask(null);
  };

  // Export / Import
  const exportData = () => {
    const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = "filiale-backup-" + todayStr() + ".json"; a.click();
    URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) { setTasks(data); setShowBackup(false); }
      } catch { alert("File non valido"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // Computed
  const activeTasks = tasks.filter(t => t.column !== "completed" && (!t.showAfter || t.showAfter <= todayStr()));
  const completedTasks = tasks.filter(t => t.column === "completed")
    .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));

  const getColumnTasks = (col) => {
    // Preserve array order (manual reordering)
    let filtered = activeTasks.filter(t => t.column === col);
    if (filterCat) filtered = filtered.filter(t => t.category === filterCat);
    if (searchText.trim()) {
      const q = searchText.toLowerCase();
      filtered = filtered.filter(t =>
        t.text.toLowerCase().includes(q) ||
        (t.waitingFor && t.waitingFor.toLowerCase().includes(q)) ||
        (t.notes && t.notes.toLowerCase().includes(q))
      );
    }
    return filtered;
  };

  const todayTasks = activeTasks.filter(t => t.column === "today");
  const todayCount = todayTasks.length;
  const oldBacklog = activeTasks.filter(t => t.column === "backlog" && daysSince(t.createdAt) >= 3).length;
  const oldWaiting = activeTasks.filter(t => t.column === "waiting" && daysSince(t.waitingDate) >= 5).length;
  const deadlineSoon = activeTasks.filter(t => t.deadline && daysUntil(t.deadline) !== null && daysUntil(t.deadline) <= 1).length;

  const yesterdayLeftovers = useMemo(() => {
    return todayTasks.filter(t => {
      const created = new Date(t.createdAt).toISOString().slice(0, 10);
      return created < todayStr();
    });
  }, [tasks]);

  const showYesterdayBanner = yesterdayLeftovers.length > 0 && !yesterdayDismissed;

  const dismissYesterday = () => {
    localStorage.setItem(YESTERDAY_KEY, todayStr());
    setYesterdayDismissed(true);
  };

  const searchResults = useMemo(() => {
    if (!searchText.trim()) return [];
    const q = searchText.toLowerCase();
    return activeTasks.filter(t =>
      t.text.toLowerCase().includes(q) ||
      (t.waitingFor && t.waitingFor.toLowerCase().includes(q)) ||
      (t.notes && t.notes.toLowerCase().includes(q))
    );
  }, [searchText, activeTasks]);

  const actionBtnStyle = {
    border: "none", background: "#F1F5F9", borderRadius: 4,
    width: 22, height: 22, fontSize: 11, cursor: "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
  };

  const recLabel = (r) => {
    if (r === "daily") return "ogni giorno";
    if (r === "weekly") return "ogni settimana";
    if (r === "monthly") return "ogni mese";
    return "";
  };

  const renderTask = (task) => {
    const days = daysSince(task.createdAt);
    const aging = task.column === "backlog" ? agingColor(days) : null;
    const waitDays = task.waitingDate ? daysSince(task.waitingDate) : 0;
    const dl = task.deadline ? daysUntil(task.deadline) : null;
    const dlColor = deadlineColor(dl);
    const cat = CATEGORIES.find(c => c.id === task.category);
    const isEditing = editingTask === task.id;
    const hasNotes = task.notes && task.notes.trim();
    const cl = task.checklist || [];
    const hasChecklist = cl.length > 0;
    const clDone = cl.filter(c => c.done).length;
    const hasExtra = hasNotes || hasChecklist;
    const noteExpanded = expandedNotes[task.id];
    const isDraggedOver = dropBeforeTask && dropBeforeTask.id === task.id;

    let cardBg = "#FFF", cardBorder = "#E2E8F0", pulseClass = "";
    if (dlColor && dl <= 1) {
      cardBg = dlColor.bg; cardBorder = dlColor.border; pulseClass = dlColor.pulse;
    } else if (aging) {
      cardBg = aging.bg; cardBorder = aging.border;
    }

    const indicatorClass = isDraggedOver
      ? (dropBeforeTask.position === "before" ? " drop-indicator-before" : " drop-indicator-after")
      : "";
    const isCompleting = completingId === task.id;

    return (
      <div key={task.id} className={"task-card " + pulseClass + indicatorClass + (isCompleting ? " completing" : "")}
        draggable={!isEditing}
        onDragStart={e => handleDragStart(e, task)}
        onDragEnd={handleDragEnd}
        onDragOver={e => handleTaskDragOver(e, task.id)}
        onDrop={e => handleTaskDrop(e, task.id)}
        style={{
          background: cardBg, border: "1.5px solid " + cardBorder,
          borderRadius: 8, padding: "8px 10px", marginBottom: 6,
          cursor: isEditing ? "text" : "grab",
          opacity: draggedTask === task.id ? 0.3 : 1,
          position: "relative", transition: "opacity 0.15s",
        }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
          <button onClick={() => completeTask(task.id)} className="complete-btn" title="Completa"
            style={{
              width: 18, height: 18, minWidth: 18, borderRadius: "50%",
              border: "2px solid #CBD5E1", background: "transparent",
              cursor: "pointer", marginTop: 2, display: "flex",
              alignItems: "center", justifyContent: "center",
            }}>
            <span className="check-mark" style={{ fontSize: 10, color: "#10B981", opacity: 0 }}>✓</span>
          </button>
          <div style={{ flex: 1, minWidth: 0 }}>
            {isEditing ? (
              <input autoFocus value={editText}
                onChange={e => setEditText(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") confirmEdit(); if (e.key === "Escape") setEditingTask(null); }}
                onBlur={confirmEdit}
                style={{
                  width: "100%", border: "none", outline: "none", fontSize: 13,
                  fontFamily: "'DM Sans', sans-serif", background: "transparent",
                  padding: 0, color: "#1E293B",
                }} />
            ) : (
              <div onDoubleClick={() => startEdit(task)}
                style={{
                  fontSize: 13,
                  color: dlColor && dl <= 0 ? dlColor.text : aging ? aging.text : "#1E293B",
                  lineHeight: 1.4, wordBreak: "break-word",
                  fontWeight: (aging && days >= 7) || (dl !== null && dl <= 0) ? 600 : 400,
                }}>{task.text}</div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
              {cat && (
                <span style={{
                  fontSize: 10, color: cat.color, background: cat.color + "18",
                  padding: "1px 6px", borderRadius: 4, fontWeight: 600,
                }}>{cat.label}</span>
              )}
              {task.recurrence && (
                <span style={{
                  fontSize: 10, color: "#6366F1", background: "#EEF2FF",
                  padding: "1px 6px", borderRadius: 4, fontWeight: 600,
                }}>🔁 {recLabel(task.recurrence)}</span>
              )}
              {dlColor && (
                <span style={{
                  fontSize: 10, color: dlColor.text, background: dlColor.bg,
                  border: "1px solid " + dlColor.border,
                  padding: "1px 6px", borderRadius: 4, fontWeight: 700,
                }}>📅 {dlColor.label}</span>
              )}
              {task.deadline && !dlColor && (
                <span style={{ fontSize: 10, color: "#64748B" }}>
                  📅 {new Date(task.deadline).toLocaleDateString("it-IT", { day: "numeric", month: "short" })}
                </span>
              )}
              {task.column === "waiting" && task.waitingFor && (
                <span style={{
                  fontSize: 10, color: waitDays >= 5 ? "#DC2626" : "#64748B",
                  fontWeight: waitDays >= 5 ? 700 : 500,
                }}>⏳ {task.waitingFor} — {waitDays}g</span>
              )}
              {task.column === "backlog" && days >= 3 && (
                <span style={{ fontSize: 10, color: aging ? aging.badge : "#F59E0B", fontWeight: 700 }}>{days}g fa</span>
              )}
              {hasChecklist && (
                <span style={{
                  fontSize: 10, color: clDone === cl.length ? "#10B981" : "#6366F1",
                  background: clDone === cl.length ? "#D1FAE510" : "#EEF2FF",
                  padding: "1px 6px", borderRadius: 4, fontWeight: 700,
                  fontFamily: "'JetBrains Mono', monospace",
                }}>{clDone}/{cl.length}</span>
              )}
              {hasExtra && (
                <button onClick={() => toggleNote(task.id)}
                  style={{
                    fontSize: 10, color: "#64748B", background: "transparent",
                    border: "none", cursor: "pointer", padding: 0,
                    fontFamily: "'DM Sans', sans-serif",
                  }}>
                  {noteExpanded ? "📝 nascondi" : "📝 " + (hasChecklist ? "dettagli" : "note")}
                </button>
              )}
            </div>
            {hasExtra && noteExpanded && (
              <div className="fade-in" style={{
                marginTop: 6, maxHeight: 140, overflowY: "auto", position: "relative",
                maskImage: "linear-gradient(to bottom, black calc(100% - 18px), transparent 100%)",
                WebkitMaskImage: "linear-gradient(to bottom, black calc(100% - 18px), transparent 100%)",
              }}>
                {hasChecklist && (
                  <div style={{ marginBottom: hasNotes ? 6 : 0 }}>
                    {cl.map(item => (
                      <div key={item.id}
                        onClick={() => toggleCheckItem(task.id, item.id)}
                        style={{
                          display: "flex", alignItems: "center", gap: 6,
                          padding: "3px 8px", cursor: "pointer", borderRadius: 4,
                          fontSize: 12, color: item.done ? "#94A3B8" : "#475569",
                          textDecoration: item.done ? "line-through" : "none",
                          transition: "background 0.1s",
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = "#F1F5F9"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                      >
                        <span style={{
                          width: 14, height: 14, minWidth: 14, borderRadius: 3,
                          border: item.done ? "none" : "1.5px solid #CBD5E1",
                          background: item.done ? "#10B981" : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 9, color: "#FFF", flexShrink: 0,
                        }}>{item.done ? "✓" : ""}</span>
                        <span style={{
                          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                        }}>{item.text}</span>
                      </div>
                    ))}
                  </div>
                )}
                {hasNotes && (
                  <div style={{
                    padding: "6px 8px", background: "#F8FAFC",
                    borderRadius: 6, fontSize: 12, color: "#475569",
                    lineHeight: 1.5, whiteSpace: "pre-wrap", borderLeft: "3px solid #CBD5E1",
                  }}>{task.notes}</div>
                )}
              </div>
            )}
          </div>
        </div>
        <div className="task-actions" style={{
          position: "absolute", top: 4, right: 4,
          display: "flex", gap: 2, opacity: 0, transition: "opacity 0.15s",
        }}>
          <button onClick={e => { e.stopPropagation(); setNoteModal(task.id); setNoteInput(task.notes || ""); setChecklistEdit(task.checklist || []); setCheckItemInput(""); setTimeout(() => noteRef.current?.focus(), 100); }}
            className="action-btn" title="Note" style={actionBtnStyle}>📝</button>
          <button onClick={e => { e.stopPropagation(); setDeadlineModal(task.id); setDeadlineInput(task.deadline || ""); setTimeout(() => deadlineRef.current?.focus(), 100); }}
            className="action-btn" title="Scadenza" style={actionBtnStyle}>📅</button>
          <button onClick={e => { e.stopPropagation(); setRecurrenceModal(recurrenceModal === task.id ? null : task.id); }}
            className="action-btn" title="Ricorrenza" style={{...actionBtnStyle, color: task.recurrence ? "#6366F1" : undefined}}>🔁</button>
          <button onClick={e => { e.stopPropagation(); setCatMenuTask(catMenuTask === task.id ? null : task.id); }}
            className="action-btn" title="Categoria" style={actionBtnStyle}>🏷️</button>
          {task.column !== "today" && <button onClick={() => moveTask(task.id, "today")} className="action-btn" title="Oggi" style={actionBtnStyle}>🎯</button>}
          {task.column !== "waiting" && <button onClick={() => moveTask(task.id, "waiting")} className="action-btn" title="In attesa" style={actionBtnStyle}>⏳</button>}
          {task.column !== "backlog" && task.column !== "inbox" && <button onClick={() => moveTask(task.id, "backlog")} className="action-btn" title="Backlog" style={actionBtnStyle}>📋</button>}
          {(task.column === "waiting" || task.column === "backlog") && <button onClick={() => moveTask(task.id, "inbox")} className="action-btn" title="Inbox" style={actionBtnStyle}>📥</button>}
          <button onClick={() => deleteTask(task.id)} className="action-btn" title="Elimina" style={{...actionBtnStyle, color: "#EF4444"}}>×</button>
        </div>
        {/* Category picker */}
        {catMenuTask === task.id && (
          <div className="fade-in" style={{
            position: "absolute", top: -4, right: -4, zIndex: 50,
            background: "#FFF", border: "1.5px solid #E2E8F0", borderRadius: 8,
            padding: 6, display: "flex", gap: 4, boxShadow: "0 4px 12px rgba(0,0,0,0.1)",
          }}>
            {CATEGORIES.map(c => (
              <button key={c.id} onClick={() => setCategoryForTask(task.id, c.id)}
                style={{
                  fontSize: 10, padding: "3px 8px", borderRadius: 4, cursor: "pointer",
                  border: task.category === c.id ? "2px solid " + c.color : "1.5px solid #E2E8F0",
                  background: task.category === c.id ? c.color + "20" : "#FFF",
                  color: c.color, fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
                }}>{c.label}</button>
            ))}
          </div>
        )}
        {/* Recurrence picker */}
        {recurrenceModal === task.id && (
          <div className="fade-in" style={{
            position: "absolute", top: -4, right: -4, zIndex: 50,
            background: "#FFF", border: "1.5px solid #E2E8F0", borderRadius: 8,
            padding: 6, display: "flex", gap: 4, boxShadow: "0 4px 12px rgba(0,0,0,0.1)",
          }}>
            {RECURRENCE_OPTIONS.map(r => (
              <button key={r.id || "none"} onClick={() => setRecurrence(task.id, r.id)}
                style={{
                  fontSize: 10, padding: "3px 8px", borderRadius: 4, cursor: "pointer",
                  border: task.recurrence === r.id ? "2px solid #6366F1" : "1.5px solid #E2E8F0",
                  background: task.recurrence === r.id ? "#EEF2FF" : "#FFF",
                  color: task.recurrence === r.id ? "#6366F1" : "#64748B",
                  fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
                  whiteSpace: "nowrap",
                }}>{r.icon} {r.label}</button>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", height: "100vh", overflow: "hidden", display: "flex", flexDirection: "column" }}
      onClick={() => { if (catMenuTask) setCatMenuTask(null); if (recurrenceModal) setRecurrenceModal(null); }}>

      {showYesterdayBanner && (
        <div className="fade-in" style={{
          background: "#FEF3C7", borderBottom: "2px solid #F59E0B",
          padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between",
          flexShrink: 0,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18 }}>⚡</span>
            <div>
              <span style={{ fontWeight: 700, color: "#92400E", fontSize: 13 }}>
                {yesterdayLeftovers.length} task da ieri ancora in "Oggi"
              </span>
              <span style={{ color: "#A16207", fontSize: 12, marginLeft: 8 }}>
                — {yesterdayLeftovers.map(t => t.text.slice(0, 25) + (t.text.length > 25 ? "…" : "")).join(" · ")}
              </span>
            </div>
          </div>
          <button onClick={dismissYesterday} style={{
            border: "1.5px solid #D97706", background: "transparent", borderRadius: 6,
            padding: "4px 12px", cursor: "pointer", fontSize: 11, fontWeight: 600,
            color: "#92400E", fontFamily: "'DM Sans', sans-serif",
          }}>Ho visto, ok</button>
        </div>
      )}

      <div style={{ padding: "12px 24px 10px", borderBottom: "1.5px solid #E2E8F0", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 22 }}>🏦</span>
            <h1 style={{ fontSize: 18, fontWeight: 700, color: "#1E293B", letterSpacing: "-0.02em" }}>
              Filiale — Task Manager
            </h1>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "#64748B" }}>
            {deadlineSoon > 0 && (
              <span style={{ color: "#DC2626", fontWeight: 700, background: "#FEE2E2", padding: "3px 10px", borderRadius: 12 }}>
                📅 {deadlineSoon} in scadenza
              </span>
            )}
            {oldBacklog > 0 && (
              <span style={{ color: "#EF4444", fontWeight: 700, background: "#FEE2E2", padding: "3px 10px", borderRadius: 12 }}>
                ⚠️ {oldBacklog} invecchiat{oldBacklog === 1 ? "a" : "e"}
              </span>
            )}
            {oldWaiting > 0 && (
              <span style={{ color: "#D97706", fontWeight: 700, background: "#FEF3C7", padding: "3px 10px", borderRadius: 12 }}>
                ⏳ {oldWaiting} attesa lunga
              </span>
            )}
            <button onClick={() => { setSearchOpen(!searchOpen); setTimeout(() => searchRef.current?.focus(), 50); }}
              title="Cerca (Ctrl+K)"
              style={{
                border: "1.5px solid #E2E8F0", background: "#F8FAFC", borderRadius: 6,
                padding: "4px 10px", cursor: "pointer", fontSize: 12, color: "#64748B",
                fontFamily: "'DM Sans', sans-serif", display: "flex", alignItems: "center", gap: 4,
              }}>
              🔍 Cerca <span className="kbd">Ctrl+K</span>
            </button>
            <button onClick={() => setShowBackup(!showBackup)} title="Backup"
              style={{
                border: "1.5px solid #E2E8F0", background: "#F8FAFC", borderRadius: 6,
                padding: "4px 8px", cursor: "pointer", fontSize: 14, lineHeight: 1,
              }}>💾</button>
            <span style={{ fontWeight: 500 }}>
              {new Date().toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" })}
            </span>
          </div>
        </div>

        {searchOpen && (
          <div className="fade-in" style={{ marginBottom: 8, position: "relative" }}>
            <input ref={searchRef} value={searchText}
              onChange={e => setSearchText(e.target.value)}
              placeholder="Cerca task, clienti, note..."
              className="search-input"
              style={{
                width: "100%", padding: "9px 14px 9px 32px", border: "1.5px solid #E2E8F0",
                borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans', sans-serif",
                outline: "none", color: "#1E293B", background: "#F8FAFC",
              }} />
            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 14 }}>🔍</span>
            {searchText && (
              <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#94A3B8" }}>
                {searchResults.length} risultat{searchResults.length === 1 ? "o" : "i"}
              </span>
            )}
          </div>
        )}

        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1, position: "relative" }}>
            <input ref={inputRef} value={inputText}
              onChange={e => setInputText(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.ctrlKey && !e.metaKey) addTask(); }}
              placeholder="Scrivi e premi Invio → Inbox · Ctrl+Invio → Oggi"
              style={{
                width: "100%", padding: "10px 14px", border: "1.5px solid #E2E8F0",
                borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans', sans-serif",
                outline: "none", color: "#1E293B", background: "#F8FAFC",
              }}
              onFocus={e => e.target.style.borderColor = "#3B82F6"}
              onBlur={e => e.target.style.borderColor = "#E2E8F0"} />
          </div>
          <button onClick={addTask} style={{
            padding: "10px 20px", background: "#1E293B", color: "#FFF",
            border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600,
            cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
          }}>+ Aggiungi</button>
        </div>

        <div style={{ display: "flex", gap: 6, marginTop: 8, alignItems: "center" }}>
          <button onClick={() => setFilterCat(null)} style={{
            fontSize: 11, padding: "3px 10px", borderRadius: 12, cursor: "pointer",
            border: !filterCat ? "1.5px solid #1E293B" : "1.5px solid #E2E8F0",
            background: !filterCat ? "#1E293B" : "#FFF",
            color: !filterCat ? "#FFF" : "#64748B",
            fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
          }}>Tutte</button>
          {CATEGORIES.map(c => (
            <button key={c.id} onClick={() => setFilterCat(filterCat === c.id ? null : c.id)} style={{
              fontSize: 11, padding: "3px 10px", borderRadius: 12, cursor: "pointer",
              border: filterCat === c.id ? "1.5px solid " + c.color : "1.5px solid #E2E8F0",
              background: filterCat === c.id ? c.color + "18" : "#FFF",
              color: filterCat === c.id ? c.color : "#64748B",
              fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
            }}>{c.label}</button>
          ))}
          {completedTasks.length > 0 && (
            <button onClick={() => setShowCompleted(!showCompleted)} style={{
              fontSize: 11, padding: "3px 10px", borderRadius: 12, cursor: "pointer",
              border: "1.5px solid #E2E8F0", background: showCompleted ? "#F0FDF4" : "#FFF",
              color: "#64748B", fontWeight: 500, fontFamily: "'DM Sans', sans-serif",
              marginLeft: "auto",
            }}>✓ Completate ({completedTasks.length})</button>
          )}
        </div>
      </div>

      {/* Columns */}
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 1.4fr 1fr 1fr",
        flex: 1, minHeight: 0,
        overflow: "hidden",
      }}>
        {Object.entries(COLUMNS).map(([key, col]) => {
          const colTasks = getColumnTasks(key);
          const isToday = key === "today";
          const isDrop = dropTarget === key;
          const overLimit = isToday && todayCount > 5;
          return (
            <div key={key}
              onDragOver={e => handleColDragOver(e, key)}
              onDragLeave={handleColDragLeave}
              onDrop={e => handleColDrop(e, key)}
              style={{
                borderRight: "1.5px solid #E2E8F0",
                display: "flex", flexDirection: "column",
                background: isDrop ? "#EFF6FF" : isToday ? "#FAFBFF" : "#FFF",
                transition: "background 0.15s",
                minHeight: 0, overflow: "hidden",
              }}>
              <div style={{ padding: "10px 14px 6px", borderBottom: "1px solid #F1F5F9" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 15 }}>{col.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#1E293B" }}>{col.label}</span>
                  <span style={{
                    fontSize: 11, fontWeight: 600,
                    background: isToday ? (overLimit ? "#FEE2E2" : "#3B82F6") : "#E2E8F0",
                    color: isToday ? (overLimit ? "#DC2626" : "#FFF") : "#64748B",
                    borderRadius: 10, padding: "1px 7px",
                    fontFamily: "'JetBrains Mono', monospace",
                  }}>{colTasks.length}</span>
                  {overLimit && (
                    <span style={{ fontSize: 10, color: "#DC2626", fontWeight: 600 }}>troppe!</span>
                  )}
                </div>
                <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 2 }}>{col.desc}</div>
              </div>
              <div style={{ flex: 1, overflow: "auto", padding: "8px 10px", minHeight: 0 }}>
                {colTasks.length === 0 && (
                  <div style={{ textAlign: "center", padding: "24px 12px", color: "#CBD5E1", fontSize: 12, fontStyle: "italic" }}>
                    {key === "inbox" ? "Nessun task — buon segno!" :
                     key === "today" ? "Scegli le priorità di oggi" :
                     key === "waiting" ? "Nulla in attesa" : "Tutto smistato!"}
                  </div>
                )}
                {colTasks.map(renderTask)}
              </div>
            </div>
          );
        })}
      </div>

      {/* Completed panel */}
      {showCompleted && (
        <div className="fade-in" style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          background: "#FFF", borderTop: "2px solid #E2E8F0",
          maxHeight: "35vh", overflow: "auto", padding: "12px 24px",
          boxShadow: "0 -4px 20px rgba(0,0,0,0.08)", zIndex: 100,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontWeight: 700, fontSize: 14, color: "#1E293B" }}>✓ Completate ({completedTasks.length})</span>
            <div style={{ display: "flex", gap: 6 }}>
              {completedTasks.length > 0 && (
                <button onClick={() => {
                  if (window.confirm("Svuotare tutte le " + completedTasks.length + " task completate? Non si può annullare.")) {
                    setTasks(prev => prev.filter(t => t.column !== "completed"));
                  }
                }} style={{
                  border: "1.5px solid #FEE2E2", background: "#FFF", borderRadius: 6,
                  padding: "4px 12px", cursor: "pointer", fontSize: 12, color: "#EF4444",
                  fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                }}>🗑️ Svuota tutte</button>
              )}
              <button onClick={() => setShowCompleted(false)} style={{
                border: "none", background: "#F1F5F9", borderRadius: 6,
                padding: "4px 12px", cursor: "pointer", fontSize: 12,
                fontFamily: "'DM Sans', sans-serif",
              }}>Chiudi</button>
            </div>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {completedTasks.map(t => {
              const cat = CATEGORIES.find(c => c.id === t.category);
              return (
                <div key={t.id} style={{
                  fontSize: 12, color: "#94A3B8", background: "#F8FAFC",
                  padding: "5px 10px", borderRadius: 6, border: "1px solid #F1F5F9",
                  display: "flex", alignItems: "center", gap: 6, textDecoration: "line-through",
                }}>
                  {cat && <span style={{ width: 6, height: 6, borderRadius: "50%", background: cat.color, display: "inline-block" }} />}
                  {t.text}
                  {t.recurrence && <span style={{ fontSize: 9, color: "#6366F1" }}>🔁</span>}
                  <button onClick={() => restoreTask(t.id)} title="Ripristina in Inbox" style={{
                    border: "1px solid #E2E8F0", background: "#FFF", borderRadius: 4,
                    cursor: "pointer", fontSize: 11, color: "#3B82F6", padding: "1px 6px",
                    fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                  }}>↩ ripristina</button>
                  <button onClick={() => deleteTask(t.id)} title="Elimina definitivamente" style={{
                    border: "none", background: "transparent", cursor: "pointer", fontSize: 13, color: "#EF4444", padding: 0,
                  }}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Waiting modal */}
      {waitingModal && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
        }} onClick={() => setWaitingModal(null)}>
          <div className="fade-in" style={{
            background: "#FFF", borderRadius: 12, padding: 24,
            width: 380, boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
          }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#1E293B", marginBottom: 4 }}>⏳ In attesa di chi?</h3>
            <p style={{ fontSize: 12, color: "#64748B", marginBottom: 14 }}>Es: Ufficio Fidi, Direzione, Cliente Rossi...</p>
            <input ref={waitingRef} value={waitingInput}
              onChange={e => setWaitingInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") confirmWaiting(); if (e.key === "Escape") setWaitingModal(null); }}
              placeholder="Chi deve risponderti?"
              style={{
                width: "100%", padding: "10px 12px", border: "1.5px solid #E2E8F0",
                borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans', sans-serif",
                outline: "none", color: "#1E293B",
              }}
              onFocus={e => e.target.style.borderColor = "#F59E0B"}
              onBlur={e => e.target.style.borderColor = "#E2E8F0"} />
            <div style={{ display: "flex", gap: 8, marginTop: 14, justifyContent: "flex-end" }}>
              <button onClick={() => setWaitingModal(null)} style={{
                padding: "8px 16px", border: "1.5px solid #E2E8F0", background: "#FFF",
                borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", color: "#64748B",
              }}>Annulla</button>
              <button onClick={confirmWaiting} style={{
                padding: "8px 16px", border: "none", background: "#F59E0B",
                borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                color: "#FFF", fontWeight: 600,
              }}>Conferma</button>
            </div>
          </div>
        </div>
      )}

      {/* Deadline modal */}
      {deadlineModal && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
        }} onClick={() => setDeadlineModal(null)}>
          <div className="fade-in" style={{
            background: "#FFF", borderRadius: 12, padding: 24,
            width: 380, boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
          }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#1E293B", marginBottom: 4 }}>📅 Scadenza</h3>
            <p style={{ fontSize: 12, color: "#64748B", marginBottom: 14 }}>Entro quando va chiusa questa task?</p>
            <input ref={deadlineRef} type="date" value={deadlineInput}
              onChange={e => setDeadlineInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") confirmDeadline(); if (e.key === "Escape") setDeadlineModal(null); }}
              style={{
                width: "100%", padding: "10px 12px", border: "1.5px solid #E2E8F0",
                borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans', sans-serif",
                outline: "none", color: "#1E293B",
              }}
              onFocus={e => e.target.style.borderColor = "#3B82F6"}
              onBlur={e => e.target.style.borderColor = "#E2E8F0"} />
            <div style={{ display: "flex", gap: 8, marginTop: 14, justifyContent: "flex-end" }}>
              {deadlineInput && (
                <button onClick={() => { setDeadlineInput(""); setTimeout(confirmDeadline, 0); }} style={{
                  padding: "8px 16px", border: "1.5px solid #FEE2E2", background: "#FFF",
                  borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", color: "#EF4444",
                }}>Rimuovi</button>
              )}
              <button onClick={() => setDeadlineModal(null)} style={{
                padding: "8px 16px", border: "1.5px solid #E2E8F0", background: "#FFF",
                borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", color: "#64748B",
              }}>Annulla</button>
              <button onClick={confirmDeadline} style={{
                padding: "8px 16px", border: "none", background: "#3B82F6",
                borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                color: "#FFF", fontWeight: 600,
              }}>Salva</button>
            </div>
          </div>
        </div>
      )}

      {/* Note modal */}
      {noteModal && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
        }} onClick={() => saveNote()}>
          <div className="fade-in" style={{
            background: "#FFF", borderRadius: 12, padding: 24,
            width: 480, maxHeight: "80vh", overflow: "auto",
            boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
          }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: "#1E293B", marginBottom: 14 }}>📝 Note e checklist</h3>

            {/* Checklist section */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#64748B", marginBottom: 8 }}>
                Checklist {checklistEdit.length > 0 && (
                  <span style={{ fontWeight: 400 }}>— {checklistEdit.filter(c => c.done).length}/{checklistEdit.length}</span>
                )}
              </div>
              {checklistEdit.length > 0 && (
                <div style={{ maxHeight: 200, overflowY: "auto", marginBottom: 6 }}>
              {checklistEdit.map((item, idx) => (
                <div key={item.id} style={{
                  display: "flex", alignItems: "center", gap: 8, padding: "4px 0",
                }}>
                  <span onClick={() => setChecklistEdit(prev => prev.map(c => c.id === item.id ? {...c, done: !c.done} : c))}
                    style={{
                      width: 18, height: 18, minWidth: 18, borderRadius: 4,
                      border: item.done ? "none" : "1.5px solid #CBD5E1",
                      background: item.done ? "#10B981" : "#FFF",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 11, color: "#FFF", cursor: "pointer",
                    }}>{item.done ? "✓" : ""}</span>
                  <span style={{
                    flex: 1, fontSize: 13, color: item.done ? "#94A3B8" : "#1E293B",
                    textDecoration: item.done ? "line-through" : "none",
                    wordBreak: "break-word",
                  }}>{item.text}</span>
                  <button onClick={() => setChecklistEdit(prev => prev.filter(c => c.id !== item.id))}
                    style={{
                      border: "none", background: "transparent", cursor: "pointer",
                      fontSize: 14, color: "#CBD5E1", padding: 0, lineHeight: 1, flexShrink: 0,
                    }}
                    onMouseEnter={e => e.target.style.color = "#EF4444"}
                    onMouseLeave={e => e.target.style.color = "#CBD5E1"}
                  >×</button>
                </div>
              ))}
                </div>
              )}
              <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                <input ref={checkItemRef} value={checkItemInput}
                  onChange={e => setCheckItemInput(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === "Enter" && checkItemInput.trim()) {
                      setChecklistEdit(prev => [...prev, { id: genId(), text: checkItemInput.trim(), done: false }]);
                      setCheckItemInput("");
                    }
                  }}
                  placeholder="Aggiungi passaggio e premi Invio..."
                  style={{
                    flex: 1, padding: "7px 10px", border: "1.5px solid #E2E8F0",
                    borderRadius: 6, fontSize: 12, fontFamily: "'DM Sans', sans-serif",
                    outline: "none", color: "#1E293B",
                  }}
                  onFocus={e => e.target.style.borderColor = "#6366F1"}
                  onBlur={e => e.target.style.borderColor = "#E2E8F0"} />
                <button onClick={() => {
                  if (checkItemInput.trim()) {
                    setChecklistEdit(prev => [...prev, { id: genId(), text: checkItemInput.trim(), done: false }]);
                    setCheckItemInput("");
                    checkItemRef.current?.focus();
                  }
                }} style={{
                  border: "none", background: "#6366F1", color: "#FFF", borderRadius: 6,
                  padding: "7px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif",
                }}>+</button>
              </div>
            </div>

            {/* Notes section */}
            <div style={{ fontSize: 12, fontWeight: 600, color: "#64748B", marginBottom: 6 }}>Note libere</div>
            <textarea ref={noteRef} value={noteInput}
              onChange={e => setNoteInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Escape") saveNote(); }}
              placeholder="Dettagli, riferimenti, numeri pratica..."
              rows={3}
              style={{
                width: "100%", padding: "10px 12px", border: "1.5px solid #E2E8F0",
                borderRadius: 8, fontSize: 13, fontFamily: "'DM Sans', sans-serif",
                outline: "none", color: "#1E293B", resize: "vertical", lineHeight: 1.5,
              }}
              onFocus={e => e.target.style.borderColor = "#3B82F6"}
              onBlur={e => e.target.style.borderColor = "#E2E8F0"} />
            <div style={{ display: "flex", gap: 8, marginTop: 14, justifyContent: "flex-end" }}>
              <button onClick={saveNote} style={{
                padding: "8px 16px", border: "none", background: "#1E293B",
                borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                color: "#FFF", fontWeight: 600,
              }}>Salva</button>
            </div>
          </div>
        </div>
      )}

      {/* Backup panel */}
      {showBackup && (
        <div className="fade-in" style={{
          position: "fixed", top: 60, right: 24, zIndex: 150,
          background: "#FFF", border: "1.5px solid #E2E8F0", borderRadius: 12,
          padding: 20, width: 280, boxShadow: "0 8px 32px rgba(0,0,0,0.12)",
        }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: "#1E293B", marginBottom: 12 }}>💾 Backup dati</h3>
          <button onClick={exportData} style={{
            width: "100%", padding: "10px", border: "1.5px solid #E2E8F0",
            borderRadius: 8, fontSize: 13, cursor: "pointer", background: "#F8FAFC",
            fontFamily: "'DM Sans', sans-serif", color: "#1E293B", fontWeight: 600, marginBottom: 8,
          }}>⬇️ Esporta JSON</button>
          <button onClick={() => fileInputRef.current?.click()} style={{
            width: "100%", padding: "10px", border: "1.5px solid #E2E8F0",
            borderRadius: 8, fontSize: 13, cursor: "pointer", background: "#F8FAFC",
            fontFamily: "'DM Sans', sans-serif", color: "#1E293B", fontWeight: 600,
          }}>⬆️ Importa backup</button>
          <input ref={fileInputRef} type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
          <p style={{ fontSize: 11, color: "#94A3B8", marginTop: 10, lineHeight: 1.4 }}>
            Esporta regolarmente per sicurezza. Il file contiene tutte le task.
          </p>
        </div>
      )}

      {/* Undo delete toast */}
      {deletedTask && (
        <div className="fade-in" style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#1E293B", color: "#FFF", borderRadius: 10,
          padding: "10px 16px", display: "flex", alignItems: "center", gap: 12,
          boxShadow: "0 8px 24px rgba(0,0,0,0.2)", zIndex: 300,
          fontSize: 13, fontFamily: "'DM Sans', sans-serif",
          overflow: "hidden",
        }}>
          <span style={{ color: "#94A3B8" }}>🗑️</span>
          <span>Eliminata: <strong>{deletedTask.text.length > 30 ? deletedTask.text.slice(0, 30) + "…" : deletedTask.text}</strong></span>
          <button onClick={undoDelete} style={{
            border: "1.5px solid #3B82F6", background: "transparent", color: "#60A5FA",
            borderRadius: 6, padding: "4px 14px", cursor: "pointer", fontSize: 12,
            fontWeight: 700, fontFamily: "'DM Sans', sans-serif", marginLeft: 4,
          }}>Annulla</button>
          <div style={{
            position: "absolute", bottom: 0, left: 0, height: 3,
            background: "#3B82F6", borderRadius: "0 0 10px 10px",
            animation: "shrinkBar 5s linear forwards",
          }} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
